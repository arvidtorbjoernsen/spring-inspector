# ─── STDIO transport requirements ────────────────────────────────────────────
#
# CRITICAL: Any output to stdout corrupts the MCP STDIO protocol framing.
# The three properties below are MANDATORY for a STDIO MCP server.
#
spring.main.web-application-type=none
spring.main.banner-mode=off
# Disable console appender entirely — stdout is the MCP STDIO wire, any output corrupts framing.
logging.console.enabled=false

# ─── MCP server identity ─────────────────────────────────────────────────────
spring.ai.mcp.server.name=spring-inspector
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.instructions=\
  Spring Boot debugging MCP server for Rounds.\n\
  Build tools: mvnTest, mvnVerify, mvnCompile, mvnRun — run Maven in apps/api.\n\
  Actuator tools: health, conditions, beans, mappings, env, loggers, setLogLevel,\n\
  metrics, httpExchanges, scheduledTasks, threadDump — query the running API.\n\
  Observability tools: prometheusTargets, prometheusQuery, phase26ObservabilityStatus — verify\n\
  Prometheus scrape health and Phase 26 metric wiring.

# ─── Logging — file only (stdout is the MCP wire) ────────────────────────────
logging.file.name=${INSPECTOR_LOG_FILE:./target/spring-inspector.log}
logging.level.root=INFO
logging.level.no.communicationflow.inspector=DEBUG

# ─── Inspector properties ─────────────────────────────────────────────────────
inspector.actuator-url=${INSPECTOR_ACTUATOR_URL:http://localhost:18082}
inspector.prometheus-url=${INSPECTOR_PROMETHEUS_URL:http://localhost:9090}
inspector.api-dir=${INSPECTOR_API_DIR:apps/api}
